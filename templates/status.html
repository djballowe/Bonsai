<div id="status" class="status-box">
  <div class="sub-status">
    <h3>Progress</h3>
    <div>state: {{.GcodeState}}</div>
    <div>progress: {{.PrintPercent}}</div>
    <div>remaining: {{.RemainingTime}}</div>
    <div>layer: {{.LayerNum}}</div>
  </div>
  <div class="sub-status">
    <h3>Temps</h3>
    <div>nozzle: {{.NozzleTemp}}</div>
    <div>bed: {{.BedTemp}}</div>
  </div>
  <div class="sub-status">
    <h3>System</h3>
    <div>wifi: {{.WifiSignal}}</div>
  </div>
</div>
